name: Build and Push obot-vibedata

permissions:
  contents: read
  packages: write
  id-token: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - chart/**
      - .github/workflows/**

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      versioned_tag: ${{ steps.resolve.outputs.versioned_tag }}
      upstream_version: ${{ steps.resolve.outputs.upstream_version }}
      upstream_sha: ${{ steps.resolve.outputs.upstream_sha }}
      fork_sha: ${{ steps.resolve.outputs.fork_sha }}
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve upstream version from metadata
        id: resolve
        run: bash scripts/build-vibedata-image.sh

  build:
    name: Build (${{ matrix.arch }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          build-args: |
            PROVIDERS_IMAGE=ghcr.io/accelerate-data/providers-vibedata:latest
            ENCRYPTION_BINS_IMAGE=ghcr.io/accelerate-data/providers-vibedata/encryption-bins:latest
          outputs: type=image,name=${{ needs.resolve.outputs.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          printf '%s' "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: obot-digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          retention-days: 1
          if-no-files-found: error

  merge:
    name: Merge manifests
    needs: [resolve, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: obot-digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest list
        id: manifest
        env:
          IMAGE: ${{ needs.resolve.outputs.image }}
          VERSIONED_TAG: ${{ needs.resolve.outputs.versioned_tag }}
        run: |
          set -euo pipefail
          SRCS=""
          for f in /tmp/digests/*; do
            SRCS="$SRCS ${IMAGE}@$(cat "$f")"
          done
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSIONED_TAG}" \
            -t "${IMAGE}:latest" \
            $SRCS
          DIGEST="$(docker buildx imagetools inspect "${IMAGE}:latest" \
            --format '{{println .Manifest.Digest}}' | head -1 | tr -d '[:space:]')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Verify both arches present
        env:
          IMAGE: ${{ needs.resolve.outputs.image }}
          VERSIONED_TAG: ${{ needs.resolve.outputs.versioned_tag }}
        run: |
          set -euo pipefail
          for tag in "$VERSIONED_TAG" latest; do
            INSPECT="$(docker buildx imagetools inspect "${IMAGE}:${tag}")"
            echo "$INSPECT"
            echo "$INSPECT" | grep -q 'linux/amd64' || { echo "::error::${tag} missing linux/amd64"; exit 1; }
            echo "$INSPECT" | grep -q 'linux/arm64' || { echo "::error::${tag} missing linux/arm64"; exit 1; }
          done

      - name: Write summary
        env:
          IMAGE: ${{ needs.resolve.outputs.image }}
          VERSIONED_TAG: ${{ needs.resolve.outputs.versioned_tag }}
          UPSTREAM_VERSION: ${{ needs.resolve.outputs.upstream_version }}
          UPSTREAM_SHA: ${{ needs.resolve.outputs.upstream_sha }}
          FORK_SHA: ${{ needs.resolve.outputs.fork_sha }}
        run: |
          {
            echo "### :whale: obot-vibedata published"
            echo ""
            echo "| Signal | Value |"
            echo "| --- | --- |"
            echo "| Upstream Obot version | \`${UPSTREAM_VERSION}\` |"
            echo "| Upstream Obot SHA | \`${UPSTREAM_SHA}\` |"
            echo "| Fork Obot SHA | \`${FORK_SHA}\` |"
            echo "| Digest | \`${{ steps.manifest.outputs.digest }}\` |"
            echo "| Tags | \`${IMAGE}:${VERSIONED_TAG}\`, \`${IMAGE}:latest\` |"
            echo "| Run | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: "v2.4.3"

      - name: Sign images
        env:
          IMAGE: ${{ needs.resolve.outputs.image }}
          VERSIONED_TAG: ${{ needs.resolve.outputs.versioned_tag }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}:${VERSIONED_TAG}@${DIGEST}"
          cosign sign --yes "${IMAGE}:latest@${DIGEST}"
