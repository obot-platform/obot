name: Build and Push Docker Image

permissions:
  id-token: write
  contents: read
  packages: write
  actions: read
  security-events: write

env:
  OBOT_IMAGE: ghcr.io/accelerate-data/obot-vibedata
  BASE_IMAGE: ghcr.io/accelerate-data/obot/base:latest
  PROVIDERS_IMAGE: ghcr.io/accelerate-data/providers
  ENCRYPTION_BINS_IMAGE: ghcr.io/accelerate-data/providers/encryption-bins
  PROVIDER_IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - docs/**
      - chart/**
      - .github/workflows/**

jobs:
  oss-build:
    runs-on: depot-ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Setup crane
        uses: imjasonh/setup-crane@v0.5

      - name: Wait for provider images
        env:
          PROVIDERS_REF: ${{ env.PROVIDERS_IMAGE }}:${{ env.PROVIDER_IMAGE_TAG }}
          ENCRYPTION_BINS_REF: ${{ env.ENCRYPTION_BINS_IMAGE }}:${{ env.PROVIDER_IMAGE_TAG }}
        run: |
          set -euo pipefail
          for ref in "${PROVIDERS_REF}" "${ENCRYPTION_BINS_REF}"; do
            echo "Waiting for ${ref}"
            for attempt in $(seq 1 60); do
              if crane manifest "${ref}" >/dev/null 2>&1; then
                echo "Found ${ref}"
                break
              fi
              if [ "${attempt}" -eq 60 ]; then
                echo "::error::Timed out waiting for ${ref}"
                exit 1
              fi
              sleep 10
            done
          done

      - name: Build and push OSS Docker image
        uses: depot/build-push-action@v1
        id: build-and-push
        with:
          project: bbqjs4tj1g
          context: .
          push: true
          pull: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.OBOT_IMAGE }}:${{ github.ref_name }}
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
            PROVIDERS_IMAGE=${{ env.PROVIDERS_IMAGE }}:${{ env.PROVIDER_IMAGE_TAG }}
            ENCRYPTION_BINS_IMAGE=${{ env.ENCRYPTION_BINS_IMAGE }}:${{ env.PROVIDER_IMAGE_TAG }}
            ENTERPRISE_IMAGE=${{ env.PROVIDERS_IMAGE }}:${{ env.PROVIDER_IMAGE_TAG }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1
        with:
          cosign-release: "v2.4.3"
      - name: Check install!
        run: cosign version

      - name: Sign Images
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ env.OBOT_IMAGE }}:${{ github.ref_name }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: Copy OSS image to latest tag
        if: ${{ github.ref_type == 'tag' && !contains(github.ref_name, '-') }}
        run: |
          crane tag ${{ env.OBOT_IMAGE }}:${{ github.ref_name }} latest

  oss-image-scan:
    runs-on: depot-ubuntu-22.04
    needs: oss-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Depot
        uses: depot/setup-action@v1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Run Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ env.OBOT_IMAGE }}:${{ github.ref_name }}
          skip-dirs: "**/venv"
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
