name: Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/helm.yml
      - chart/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/helm.yml
      - chart/**

jobs:
  build:
    runs-on: depot-ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint chart --set dev.useEmbeddedDb=true

      - name: Render Helm chart
        run: helm template obot chart --namespace obot --set dev.useEmbeddedDb=true

      - name: Test Helm install
        run: helm install obot chart --namespace obot --create-namespace --dry-run=client --set dev.useEmbeddedDb=true

      - name: Build Helm chart package
        run: |
          mkdir -p packaged
          helm package chart --destination packaged

      - name: Verify Helm chart package
        run: test -f packaged/*.tgz
