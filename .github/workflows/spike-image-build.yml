# Spike: validate image build pipeline without Depot.
#
# Two parallel jobs:
#   qemu    — single ubuntu-latest runner, arm64 via QEMU emulation
#   native  — amd64 + arm64 on separate native runners, merged via imagetools
#
# Both push to ghcr.io/accelerate-data/obot-vibedata:spike-<approach>
# using GITHUB_TOKEN (no external secrets needed).
#
# Trigger manually via Actions → "Spike: Image Build (no Depot)" → Run workflow.
# Check: both jobs green, both tags visible in GHCR, inspect manifest to confirm
# both linux/amd64 and linux/arm64 are present.

name: "Spike: Image Build (no Depot)"

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/accelerate-data/obot-vibedata

jobs:

  # ── Option A: QEMU on a single amd64 runner ───────────────────────────────
  # Simple, zero config — but arm64 builds via software emulation.
  # Expect slow for a Go+Node image (~30-60 min). Fast for tiny images.
  qemu:
    name: "A: QEMU multi-arch"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push (amd64 + arm64 via QEMU)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE }}:spike-qemu
          build-args: |
            BASE_IMAGE=ghcr.io/accelerate-data/obot/base:latest
            PROVIDERS_IMAGE=ghcr.io/accelerate-data/providers-vibedata:latest
            ENCRYPTION_BINS_IMAGE=ghcr.io/accelerate-data/providers-vibedata/encryption-bins:latest
            ENTERPRISE_IMAGE=ghcr.io/accelerate-data/providers-vibedata:latest

      - name: Verify manifest contains both arches
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE }}:spike-qemu"

      - name: Summary
        run: |
          echo "### A: QEMU result" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: \`${{ env.IMAGE }}:spike-qemu\`" >> "$GITHUB_STEP_SUMMARY"

  # ── Option B: Native runner matrix ────────────────────────────────────────
  # Mirrors Studio's build-multiarch.yml approach.
  # Each arch builds on native hardware (fast), then imagetools merges digests.
  # No external service — just GitHub-hosted runners.
  native-build:
    name: "B: Native (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: true
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          build-args: |
            BASE_IMAGE=ghcr.io/accelerate-data/obot/base:latest
            PROVIDERS_IMAGE=ghcr.io/accelerate-data/providers-vibedata:latest
            ENCRYPTION_BINS_IMAGE=ghcr.io/accelerate-data/providers-vibedata/encryption-bins:latest
            ENTERPRISE_IMAGE=ghcr.io/accelerate-data/providers-vibedata:latest
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          retention-days: 1

  native-merge:
    name: "B: Merge manifests"
    runs-on: ubuntu-latest
    needs: native-build
    timeout-minutes: 10
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push manifest list
        id: merge
        run: |
          set -euo pipefail
          SRCS=""
          for f in /tmp/digests/*; do
            SRCS="$SRCS ${{ env.IMAGE }}@$(cat "$f")"
          done
          docker buildx imagetools create -t "${{ env.IMAGE }}:spike-native" $SRCS
          DIGEST="$(docker buildx imagetools inspect "${{ env.IMAGE }}:spike-native" \
            --format '{{println .Manifest.Digest}}' | head -1 | tr -d '[:space:]')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Verify manifest contains both arches
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:spike-native"

      - name: Summary
        run: |
          echo "### B: Native runner result" >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.merge.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tag: \`${{ env.IMAGE }}:spike-native\`" >> "$GITHUB_STEP_SUMMARY"
