apiVersion: v1
kind: ConfigMap
metadata:
  name: obot-proxy-config
  namespace: default
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        location / {
          proxy_pass http://obot-upstream.default.svc.cluster.local:8080;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header Accept-Encoding "";

          sub_filter 'http://localhost:8080' 'http://obot.default.svc.cluster.local';
          sub_filter_once off;
          sub_filter_types *;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obot-proxy
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obot-proxy
  template:
    metadata:
      labels:
        app: obot-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: obot-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: obot
  namespace: default
spec:
  selector:
    app: obot-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
