{{- include "obot.validateNetworkPolicyProviderChartConfig" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "obot.fullname" . }}
  labels:
    {{- include "obot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ if .Values.dev.useEmbeddedDb }}Recreate{{ else }}{{ .Values.updateStrategy }}{{ end }}
  selector:
    matchLabels:
      {{- include "obot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if not .Values.secret.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        checksum/internal-config: {{ include (print $.Template.BasePath "/internal-configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "obot.labels" . | nindent 8 }}
    spec:
      {{- if .Values.runtimeClassName }}
      runtimeClassName: {{ .Values.runtimeClassName }}
      {{- end }}
      serviceAccountName: {{ include "obot.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if eq .Values.config.OBOT_SERVER_ENCRYPTION_PROVIDER "custom" }}
      initContainers:
        - name: encryptionsetup
          image: "{{ .Values.image.repository }}:{{ include "obot.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "obot.config.configMapName" . }}
            - secretRef:
                name: {{ include "obot.secret.secretName" . }}
          command:
          - /bin/sh
          - -c
          - |
            provider="$(printf '%s' "${OBOT_SERVER_ENCRYPTION_PROVIDER}" | tr '[:upper:]' '[:lower:]')"
            if [ "${provider}" != "custom" ]; then
              exit 0
            fi
            if [ -z "${OBOT_SERVER_ENCRYPTION_KEY}" ]; then
              echo "OBOT_SERVER_ENCRYPTION_KEY must be set when OBOT_SERVER_ENCRYPTION_PROVIDER=custom" >&2
              exit 1
            fi
            cat > /config/encryption.yaml <<EOF
            kind: EncryptionConfiguration
            apiVersion: apiserver.config.k8s.io/v1
            resources:
              - resources:
                  - credentials.obot.obot.ai
                  - users.obot.obot.ai
                  - identities.obot.obot.ai
                  - mcpoauthtokens.obot.obot.ai
                  - mcpauditlogs.obot.obot.ai
                  - mcpoauthpendingstates.obot.obot.ai
                  - policyviolations.obot.obot.ai
                  - properties.obot.obot.ai
                providers:
                  - aesgcm:
                      keys:
                        - name: key0
                          secret: "${OBOT_SERVER_ENCRYPTION_KEY}"
                  - identity: {}
            EOF
          volumeMounts:
            - name: config
              mountPath: /config
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "obot.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            {{- if eq .Values.config.OBOT_SERVER_ENCRYPTION_PROVIDER "custom" }}
            - name: config
              mountPath: /config
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.path }}
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            failureThreshold: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            failureThreshold: 5
            periodSeconds: 10
          env:
            - name: OBOT_SERVER_SERVICE_ACCOUNT_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.serviceAccountName
          envFrom:
            - configMapRef:
                name: {{ include "obot.config.configMapName" . }}
            - secretRef:
                name: {{ include "obot.secret.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      {{- if eq .Values.config.OBOT_SERVER_ENCRYPTION_PROVIDER "custom" }}
        - name: config
          emptyDir:
            medium: Memory
      {{- end }}
      {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ ternary .Values.persistence.existingClaim (print .Release.Name "-pvc") (ne .Values.persistence.existingClaim "") }}
      {{- end }}
      {{- if .Values.extraVolumes }}
        {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}
