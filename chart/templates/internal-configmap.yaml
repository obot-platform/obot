apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "obot.config.configMapName" . }}
  labels:
    {{- include "obot.labels" . | nindent 4 }}
data:
  {{- $cfg := .Values.config -}}
    {{- $forbidden := list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY" "OBOT_SERVER_OTEL_BEARER_TOKEN" "OBOT_SERVER_MCPIMAGE_PULL_SECRET" "OBOT_SERVER_DSN" "OPENAI_API_KEY" "ANTHROPIC_API_KEY" "GITHUB_AUTH_TOKEN" "OBOT_SERVER_ENCRYPTION_KEY" "OBOT_BOOTSTRAP_TOKEN" "OBOT_SERVER_LICENSE_KEY" "OBOT_SERVER_MCPIMAGE_PULL_SECRETS" "OBOT_ARTIFACT_S3_ACCESS_KEY_ID" "OBOT_ARTIFACT_S3_SECRET_ACCESS_KEY" "OBOT_ARTIFACT_GCS_SERVICE_ACCOUNT_JSON" "OBOT_ARTIFACT_AZURE_CLIENT_SECRET" -}}
  {{- range $key := keys $cfg | sortAlpha }}
    {{- if has $key $forbidden -}}
    {{- fail (printf "config.%s must be set under .Values.secret (not .Values.config)" $key) -}}
    {{- end }}
  {{- $value := index $cfg $key }}
  {{- if (toString $value) }}
  {{ $key }}: {{ toString $value | quote }}
  {{- end }}
  {{- end }}
  {{- if eq .Values.config.OBOT_SERVER_MCPRUNTIME_BACKEND "kubernetes" }}
  OBOT_SERVER_MCPNAMESPACE: {{ include "obot.config.mcpNamespace" . | quote }}
  OBOT_SERVER_SERVICE_NAME: {{ include "obot.fullname" . | quote }}
  OBOT_SERVER_SERVICE_NAMESPACE: {{ .Release.Namespace | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.affinity }}
  OBOT_SERVER_MCPK8S_SETTINGS_AFFINITY: {{ .Values.mcpServerDefaults.affinity | toJson | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.tolerations }}
  OBOT_SERVER_MCPK8S_SETTINGS_TOLERATIONS: {{ .Values.mcpServerDefaults.tolerations | toJson | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.resources }}
  OBOT_SERVER_MCPK8S_SETTINGS_RESOURCES: {{ .Values.mcpServerDefaults.resources | toJson | quote }}
  {{- end }}
  OBOT_SERVER_MCPPOD_SECURITY_ENABLED: {{ .Values.mcpNamespace.podSecurity.enabled | toString | quote }}
  {{- if .Values.mcpNamespace.podSecurity.enabled }}
  OBOT_SERVER_MCPPOD_SECURITY_ENFORCE: {{ .Values.mcpNamespace.podSecurity.enforce | quote }}
  OBOT_SERVER_MCPPOD_SECURITY_ENFORCE_VERSION: {{ .Values.mcpNamespace.podSecurity.enforceVersion | quote }}
  OBOT_SERVER_MCPPOD_SECURITY_AUDIT: {{ .Values.mcpNamespace.podSecurity.audit | quote }}
  OBOT_SERVER_MCPPOD_SECURITY_AUDIT_VERSION: {{ .Values.mcpNamespace.podSecurity.auditVersion | quote }}
  OBOT_SERVER_MCPPOD_SECURITY_WARN: {{ .Values.mcpNamespace.podSecurity.warn | quote }}
  OBOT_SERVER_MCPPOD_SECURITY_WARN_VERSION: {{ .Values.mcpNamespace.podSecurity.warnVersion | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.runtimeClassName }}
  OBOT_SERVER_MCPK8S_SETTINGS_RUNTIME_CLASS_NAME: {{ .Values.mcpServerDefaults.runtimeClassName | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.storageClassName }}
  OBOT_SERVER_MCPK8S_SETTINGS_STORAGE_CLASS_NAME: {{ .Values.mcpServerDefaults.storageClassName | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.nanobotWorkspaceSize }}
  OBOT_SERVER_MCPK8S_SETTINGS_NANOBOT_WORKSPACE_SIZE: {{ .Values.mcpServerDefaults.nanobotWorkspaceSize | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.maxCPURequest }}
  OBOT_SERVER_MCPK8S_MAX_CPUREQUEST: {{ .Values.mcpServerDefaults.maxCPURequest | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.maxCPULimit }}
  OBOT_SERVER_MCPK8S_MAX_CPULIMIT: {{ .Values.mcpServerDefaults.maxCPULimit | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.maxMemoryRequest }}
  OBOT_SERVER_MCPK8S_MAX_MEMORY_REQUEST: {{ .Values.mcpServerDefaults.maxMemoryRequest | quote }}
  {{- end }}
  {{- if .Values.mcpServerDefaults.maxMemoryLimit }}
  OBOT_SERVER_MCPK8S_MAX_MEMORY_LIMIT: {{ .Values.mcpServerDefaults.maxMemoryLimit | quote }}
  {{- end }}
