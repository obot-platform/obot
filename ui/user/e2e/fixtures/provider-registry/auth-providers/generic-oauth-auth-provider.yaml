name: Custom OAuth / OIDC
command: ../generic-oauth-fixture-provider.sh
icon: data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='6'%20fill='%231f2937'/%3E%3Cpath%20d='M9%2016a7%207%200%200%201%207-7h2v4h-2a3%203%200%201%200%203%203v-2h4v2a7%207%200%201%201-14%200Z'%20fill='%23fff'/%3E%3Cpath%20d='M17%2019h6v4h-6z'%20fill='%235eead4'/%3E%3C/svg%3E
